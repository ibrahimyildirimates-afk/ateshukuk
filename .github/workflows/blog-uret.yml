name: Otomatik Blog Üretici — Ateş Hukuk

on:
  schedule:
    - cron: "0 5 * * *"  # Her gün 08:00 TR saati
  workflow_dispatch:
  push:
    paths:
      - 'blog/**'  # blog/ klasörüne yeni dosya eklenince de çalışır

jobs:
  blog-uret:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Kodu çek
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Bağımlılıkları yükle
        run: pip install anthropic

      - name: Blog üret (sadece schedule/manuel)
        if: github.event_name != 'push'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python generate_blog.py

      - name: Index'i senkronize et (tüm eventlarda)
        run: python sync_blog_index.py

      - name: Git ayarla
        run: |
          git config user.name "Ateş Hukuk Blog Bot"
          git config user.email "bot@noreply.com"

      - name: Değişiklikleri kaydet ve yükle
        run: |
          # 1. Değişiklikleri Git'e tanıt
          git add blog/ index.html blog.html
          
          # 2. Eğer hiç değişiklik yoksa işlemi bitir
          if git diff --staged --quiet; then
            echo "✅ Değişiklik yok, atlandı."
            exit 0
          fi
          
          # 3. Çakışmayı önlemek için yapılan değişiklikleri geçici olarak kenara al
          git stash
          
          # 4. Uzak sunucudaki güncel dosyaları çek
          git pull --rebase origin main
          
          # 5. Kenara aldığın değişiklikleri tekrar uygula
          git stash pop || echo "Çakışma yok, devam ediliyor."
          
          # 6. Değişiklikleri tekrar ekle, imzala ve gönder
          git add blog/ index.html blog.html
          git commit -m "🤖 Blog sync: $(date +'%Y-%m-%d')"
          git push
