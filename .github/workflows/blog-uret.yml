name: Blog Sync — Ateş Hukuk
on:
  push:
    paths:
      - 'blog/**'
jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Kodu çek
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Git ayarla
        run: |
          git config user.name "Ateş Hukuk Blog Bot"
          git config user.email "bot@noreply.com"
          git pull --rebase origin main
      - name: Index'i senkronize et
        run: python sync_blog_index.py
      - name: Değişiklikleri kaydet ve yükle
        run: |
          git add index.html blog.html
          if git diff --staged --quiet; then
            echo "✅ Değişiklik yok."
            exit 0
          fi
          git commit -m "🤖 Blog sync: $(date +'%Y-%m-%d')"
          git push
